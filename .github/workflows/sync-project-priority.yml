name: Sync issue priority label → GitHub Project

on:
  issues:
    types: [labeled, unlabeled, opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_NUMBER = 1;
            const OWNER = 'tariqk00';
            const PROJECT_ID = 'PVT_kwHOAI5Oic4BT3Jm';
            const PRIORITY_FIELD = 'PVTSSF_lAHOAI5Oic4BT3JmzhBHkZg';
            const STATUS_FIELD = 'PVTSSF_lAHOAI5Oic4BT3JmzhBDHqA';

            const PRIORITY_OPTIONS = {
              'now':      'eac37475',
              'next':     '9a541802',
              'later':    '7137d55a',
              'deferred': '2bdc4bae',
            };
            const STATUS_OPTIONS = {
              'open':   'f75ad846',  // Todo
              'closed': '98236657',  // Done
            };

            const issue = context.payload.issue;
            const issueNodeId = issue.node_id;

            // 1. Ensure issue is in the project (add if missing)
            let itemId;
            try {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                contentId: issueNodeId,
              });
              itemId = addResult.addProjectV2ItemById.item.id;
            } catch (error) {
              const alreadyExists = error.errors?.some(e => e.message.includes('Content already exists in this project'));
              if (alreadyExists) {
                console.log('Issue already in project, fetching existing item ID...');
                const queryResult = await github.graphql(`
                  query($contentId: ID!) {
                    node(id: $contentId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project { id }
                          }
                        }
                      }
                    }
                  }
                `, { contentId: issueNodeId });
                itemId = queryResult.node.projectItems.nodes.find(n => n.project.id === PROJECT_ID)?.id;
              }
              if (!itemId) throw error;
            }

            // 2. Set Priority from labels
            const labels = issue.labels.map(l => l.name.toLowerCase());
            const priority = ['now', 'next', 'later', 'deferred'].find(p => labels.includes(p));
            if (priority) {
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) { projectV2Item { id } }
                }
              `, {
                projectId: PROJECT_ID,
                itemId,
                fieldId: PRIORITY_FIELD,
                value: { singleSelectOptionId: PRIORITY_OPTIONS[priority] },
              });
            }

            // 3. Set Status from issue state
            const statusOptionId = issue.state === 'closed'
              ? STATUS_OPTIONS['closed']
              : STATUS_OPTIONS['open'];
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                }) { projectV2Item { id } }
              }
            `, {
              projectId: PROJECT_ID,
              itemId,
              fieldId: STATUS_FIELD,
              value: { singleSelectOptionId: statusOptionId },
            });

            console.log(`Synced #${issue.number}: priority=${priority || 'unchanged'}, status=${issue.state}`);
